<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SLG Visualization</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <h1>SLG Visualization</h1>
  <div class="subtitle">
    Drag a trip from the palette onto the grid &middot; drag bars to move them &middot;
    drag the right edge to resize &middot; click a trip to recolor or delete
    (or press <kbd>Delete</kbd>)
  </div>
</header>

<div class="controls">
  <label>Pilots <input type="number" id="pilotCount" value="20" min="1" max="50" step="1"></label>
  <div class="divider-v"></div>
  <span class="controls-label">Randomizer</span>
  <label>Min CH <input type="number" id="minCh" value="68" min="0" max="200" step="1"></label>
  <label>Max CH <input type="number" id="maxCh" value="78" min="0" max="200" step="1"></label>
  <button class="build-btn" id="randomizeBtn">Build random schedule</button>
  <div class="divider-v"></div>
  <button class="feasibility-btn" id="feasibilityBtn">Feasibility</button>
</div>

<div class="feasibility-banner" id="feasibilityBanner"></div>

<div class="layout">
  <div class="palette" id="palette"></div>

  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>
</div>

<div class="pool" id="tripPool">
  <h2>Trip Pool <span class="pool-count" id="poolCount">0</span></h2>
  <div class="pool-bars" id="poolBars"></div>
</div>

<div class="bank" id="tripBank">
  <div class="bank-head">
    <span class="bank-title">Trip Bank</span>
    <div class="bank-config" id="bankConfig"></div>
    <button class="bank-clear-btn" id="bankClearBtn">Clear bank</button>
  </div>
  <div class="bank-bars" id="bankBars"></div>
</div>

<div class="toolbar" id="toolbar">
  <div class="hpd-group" id="hpdGroup">
    <span class="label">Hours/day</span>
    <input type="text" id="hpdInput" placeholder="4:45">
    <div class="divider"></div>
  </div>
  <span class="label">Color</span>
  <div class="swatches" id="swatches"></div>
  <div class="divider"></div>
  <button class="delete-btn" id="deleteBtn">Delete</button>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
